name: Manual collect

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Slug source à moissonner (laisser vide pour un run global)"
        required: false
        type: string

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      JOBS_ARCHIVE_MISSED_THRESHOLD: ${{ secrets.JOBS_ARCHIVE_MISSED_THRESHOLD }}
      USER_AGENT: ${{ secrets.USER_AGENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f agent/requirements.txt ]; then
            pip install -r agent/requirements.txt
          else
            echo "agent/requirements.txt introuvable"
            exit 1
          fi

      - name: Run targeted or global collection
        working-directory: agent
        shell: bash
        run: |
          export JOBS_ARCHIVE_MISSED_THRESHOLD="${JOBS_ARCHIVE_MISSED_THRESHOLD:-2}"
          export USER_AGENT="${USER_AGENT:-ITA Jobs Bot/1.0 (+https://example.org)}"

          if [ -n "${{ github.event.inputs.source }}" ]; then
            echo "Running targeted source: ${{ github.event.inputs.source }}"
            python -m app.main_backfill_sources --source "${{ github.event.inputs.source }}"
          else
            echo "Running global collection"
            python -m app.main_collect_daily --skip-paris-guard
          fi
